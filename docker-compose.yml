version: '3.8'

services:
  db:
    image: postgres:13-alpine
    # Map the standard Postgres variables to your custom .env variables
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"

  api:
    build: .
    ports:
      - "5000:5000"
    # Tell Docker to load all variables directly from the .env file
    env_file:
      - .env
    # Override DB_HOST to point to the Docker service name ('db') instead of 'localhost'
    environment:
      - DB_HOST=db
    depends_on:
      - db